# Este flujo de trabajo instalará las dependencias de Python, ejecutará pruebas y realizará linting con varias versiones de Python
# Para más información, consulta: https://docs.github.com/es/actions/automating-builds-and-tests/building-and-testing-python

name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Instalar Dependencias
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ejecutar Pruebas
      run: |
        cd backend
        python manage.py test
    - name: Ejecutar linting
      run: |
        cd backend
        pip install flake8
        flake8 .
    - name: Verificar vulnerabilidades de seguridad
      run: |
        cd backend
        pip install safety
        safety check
